.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
.sl{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#aaa;margin-bottom:10px;}
.avt{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;}
.yt{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}

.ytb.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.mbar{margin-bottom:14px;}
.mbar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
.mbar-label{font-size:12px;font-weight:500;width:36px;flex-shrink:0;}
.mbar-val{font-size:13px;font-weight:500;flex:1;}
.mbar-badge{font-size:11px;padding:2px 8px;border-radius:4px;flex-shrink:0;}
.mbar-track{height:10px;background:#f0f0ee;border-radius:5px;position:relative;}
.mbar-fill{height:10px;border-radius:5px;}
.mbar-line{position:absolute;top:-3px;width:2px;height:16px;background:#854f0b;border-radius:1px;}
.ins{padding:12px 14px;border-radius:8px;font-size:12px;line-height:1.6;}
.ins-g{background:#eaf3de;color:#27500a;}
.ins-a{background:#faeeda;color:#633806;}
.ins-r{background:#fcebeb;color:#7a1f1f;}
.wk-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0ee;font-size:13px;gap:8px;}
.wk-row:last-child{border-bottom:none;}
.badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;flex-shrink:0;}
.divider{border:none;border-top:1px solid #e5e5e3;margin:1rem 0;}
@media(max-width:600px){.g3{grid-template-columns:1fr 1fr;}}
@media print{.topbar,.noprint{display:none!important;}body{background:#fff;}}
</style>

const MO=['Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar','Apr','May','Jun'];
const TARGET_ID='helen';
let curYear='2025-26';
let chart=null;

function $f(n){if(n==null||isNaN(n))return'-';return(n<0?'-$':'$')+Math.abs(Math.round(n)).toLocaleString();}
function $p(n){if(n==null||isNaN(n))return'-';return Math.round(n)+'%';}
function ini(name){return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function cw(w){const tc=w.w+w.o,wp=w.t>0?(w.w/w.t)*100:999,cp=w.t>0?(tc/w.t)*100:999,pr=w.t-tc;return{...w,tc,wp,cp,pr};}
function allW(s,y){let a=[];MO.forEach(m=>{if(s.years[y]&&s.years[y][m])a=a.concat(s.years[y][m].weeks);});return a.map(cw);}

const s=STAFF.find(x=>x.id===TARGET_ID);

function render(){
  const weeks=allW(s,curYear);
  if(!weeks.length){
    document.getElementById('metrics-top').innerHTML='<div style="color:#aaa;grid-column:1/-1;padding:1rem 0;">No data for this period.</div>';
    document.getElementById('metrics-avg').innerHTML='';
    document.getElementById('month-bars').innerHTML='<div style="color:#aaa;">No data.</div>';
    document.getElementById('weekly-list').innerHTML='';
    return;
  }

  const n=weeks.length;
  const totTO=weeks.reduce((a,w)=>a+w.t,0);
  const totW=weeks.reduce((a,w)=>a+w.w,0);
  const totPr=weeks.reduce((a,w)=>a+w.pr,0);
  const avgTO=Math.round(totTO/n);
  const avgW=Math.round(totW/n);
  const avgPr=Math.round(totPr/n);
  const awp=Math.round(weeks.reduce((a,w)=>a+w.wp,0)/n);
  const bk=Math.ceil(weeks.reduce((a,w)=>a+w.tc,0)/n);
  const best=weeks.reduce((a,w)=>w.t>a.t?w:a,weeks[0]);
  const hit=weeks.filter(w=>w.t>=bk).length;
  const hitp=Math.round((hit/n)*100);

  // Top metrics - performance summary
  document.getElementById('metrics-top').innerHTML=`
    <div class="met"><div class="ml">Total turnover</div><div class="mv">${$f(totTO)}</div><div class="ms">${n} weeks recorded</div></div>
    <div class="met"><div class="ml">Best week ever</div><div class="mv" style="color:#3b6d11;">${$f(best.t)}</div><div class="ms">${best.date}</div></div>
    <div class="met" style="background:${totPr>=0?'#eaf3de':'#fcebeb'};"><div class="ml" style="color:${totPr>=0?'#3b6d11':'#a32d2d'};">Total profit/loss</div><div class="mv" style="color:${totPr>=0?'#3b6d11':'#a32d2d'};">${$f(totPr)}</div></div>`;

  // Avg metrics
  document.getElementById('metrics-avg').innerHTML=`
    <div class="met"><div class="ml">Avg turnover/week</div><div class="mv">${$f(avgTO)}</div><div class="ms">weekly average</div></div>
    <div class="met"><div class="ml">Avg wage/week</div><div class="mv">${$f(avgW)}</div><div class="ms" style="color:${awp>45?'#a32d2d':'#3b6d11'};">${awp}% of turnover</div></div>
    <div class="met" style="background:${avgPr>=0?'#eaf3de':'#fcebeb'};"><div class="ml" style="color:${avgPr>=0?'#3b6d11':'#a32d2d'};">Avg profit/loss week</div><div class="mv" style="color:${avgPr>=0?'#3b6d11':'#a32d2d'};">${$f(avgPr)}</div></div>`;

  // Breakeven
  document.getElementById('breakeven').innerHTML=`<strong>Weekly target:</strong> You need <strong>${$f(bk)}/week</strong> to cover all costs. Your average is <strong>${$f(avgTO)}/week</strong>.`;
  document.getElementById('breakeven').className='ins '+(avgTO>=bk?'ins-g':avgTO>=bk*0.85?'ins-a':'ins-r');

  // Monthly bars
  const ydata=s.years[curYear]||{};
  let mbars='';
  MO.filter(m=>ydata[m]).forEach(m=>{
    const mw=(ydata[m].weeks||[]).map(cw);
    if(!mw.length)return;
    const mTO=mw.reduce((a,w)=>a+w.t,0);
    const mW=mw.reduce((a,w)=>a+w.w,0);
    const mPr=mw.reduce((a,w)=>a+w.pr,0);
    const avg=Math.round(mTO/mw.length);
    const avgMW=Math.round(mW/mw.length);
    const avgMPr=Math.round(mPr/mw.length);
    const bp=Math.min((avg/bk)*100,100);
    const col=avg>=bk?'#639922':avg>=bk*0.85?'#EF9F27':'#E24B4A';
    const bg=avg>=bk?'#eaf3de':avg>=bk*0.85?'#faeeda':'#fcebeb';
    const fg=avg>=bk?'#3b6d11':avg>=bk*0.85?'#854f0b':'#a32d2d';
    const prCol=avgMPr>=0?'#3b6d11':'#a32d2d';
    mbars+=`<div class="mbar">
      <div class="mbar-row">
        <span class="mbar-label">${m}</span>
        <span class="mbar-val">${$f(avg)}<span style="font-size:11px;font-weight:400;color:#aaa;">/wk avg · wage ${$f(avgMW)} · profit <span style="color:${prCol};">${$f(avgMPr)}</span></span></span>
        <span class="mbar-badge" style="background:${bg};color:${fg};">${avg>=bk?'Target met':avg>=bk*0.85?'Close':'Below target'}</span>
      </div>
      <div class="mbar-track">
        <div class="mbar-fill" style="width:${bp}%;background:${col};"></div>
        <div class="mbar-line" style="left:min(99%,99%);"></div>
      </div>
    </div>`;
  });
  document.getElementById('month-bars').innerHTML=mbars||'<div style="color:#aaa;">No monthly data available.</div>';

  // Weekly list
  let wlist='';
  weeks.forEach(w=>{
    const hit2=w.t>=bk,close=w.t>=bk*0.85;
    const bg=hit2?'#eaf3de':close?'#faeeda':'#fcebeb';
    const fg=hit2?'#3b6d11':close?'#854f0b':'#a32d2d';
    wlist+=`<div class="wk-row">
      <span style="color:#888;font-size:12px;flex-shrink:0;">${w.date}</span>
      <span style="font-weight:600;">${$f(w.t)}</span>
      <span class="badge" style="background:${bg};color:${fg};">${hit2?'Target met':close?'Close':'Below'}</span>
    </div>`;
  });
  document.getElementById('weekly-list').innerHTML=wlist;

  // Summary
  document.getElementById('summary').innerHTML=`<strong>Summary:</strong> You hit target in <strong>${hit} of ${n} weeks</strong> (${hitp}%). ${hitp>=70?'Excellent — keep it up!':hitp>=40?`Getting there — aim for ${$f(bk)} or more every week.`:`Your best week was ${$f(best.t)} — that shows what you can do. Aim for that consistently.`}`;
  document.getElementById('summary').className='ins '+(hitp>=70?'ins-g':hitp>=40?'ins-a':'ins-r');

  // Chart
  if(chart)chart.destroy();
  const labs=weeks.map(w=>w.date.replace(/\s\d{4}/,'').replace(/^\d+-/,''));
  const ctx=document.getElementById('trend-chart');
  if(ctx)chart=new Chart(ctx,{type:'line',data:{labels:labs,datasets:[{label:'Turnover',data:weeks.map(w=>w.t),borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,0.07)',tension:0.3,pointBackgroundColor:weeks.map(w=>w.t>=bk?'#639922':'#E24B4A'),pointRadius:4,fill:true},{label:'Target',data:weeks.map(()=>bk),borderColor:'#854F0B',borderDash:[5,4],pointRadius:0,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},autoSkip:true,maxTicksLimit:12},grid:{display:false}},y:{ticks:{font:{size:10},callback:v=>'$'+Math.round(v/1000)+'k'},grid:{color:'rgba(0,0,0,0.04)'},min:0}}}});
}

function setYear(y){
  curYear=y;
  document.querySelectorAll('.ytb').forEach(t=>t.classList.toggle('on',t.textContent===y));
  render();
}

// Init
document.getElementById('avt').style.background=s.c.bg;
document.getElementById('avt').style.color=s.c.fg;
document.getElementById('avt').textContent=ini(s.name);
document.getElementById('sname').textContent=s.name;
document.getElementById('srole').textContent=s.role+' · Castle Hill Barbershop';
document.getElementById('upd').textContent='Updated: '+new Date().toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});

const sy=Object.keys(s.years).sort();
curYear=sy[sy.length-1];
document.getElementById('yr-tabs').innerHTML=sy.map(y=>`<div class="ytb${y===curYear?' on':''}" onclick="setYear('${y}')">${y}</div>`).join('');

render();
</script>
</body>
</html>
