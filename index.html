<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Castle Hill — Staff Performance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;}
.topbar{background:#fff;border-bottom:1px solid #e5e5e3;padding:0 1.25rem;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:100;}
.brand{font-size:15px;font-weight:600;padding:1rem 1rem 1rem 0;margin-right:1rem;border-right:1px solid #e5e5e3;}
.brand span{font-weight:400;color:#888;margin-left:4px;}
.tab{padding:1rem .9rem;font-size:13px;color:#666;cursor:pointer;border-bottom:2px solid transparent;}
.tab.on{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500;}
.app{max-width:1100px;margin:0 auto;padding:1.25rem;}
.page{display:none;}.page.on{display:block;}
.card{background:#fff;border:1px solid #e5e5e3;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.card0{background:#fff;border:1px solid #e5e5e3;border-radius:12px;overflow:hidden;margin-bottom:1rem;}
.met{background:#f5f5f3;border-radius:8px;padding:12px 14px;}
.ml{font-size:11px;color:#888;margin-bottom:5px;}
.mv{font-size:20px;font-weight:600;}
.ms{font-size:11px;color:#aaa;margin-top:2px;}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;}
.sl{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#aaa;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{font-size:11px;font-weight:500;color:#888;padding:8px 8px;border-bottom:1px solid #e5e5e3;background:#fafafa;text-align:right;white-space:nowrap;}
th:first-child{text-align:left;}
td{padding:8px 8px;border-bottom:1px solid #f0f0ee;text-align:right;color:#1a1a1a;white-space:nowrap;}
td:first-child{text-align:left;color:#666;}
.tr{font-weight:600;background:#fafafa;}
.ar{font-size:11px;color:#888;background:#f5f5f3;}
.pos{color:#3b6d11;font-weight:500;}
.neg{color:#a32d2d;font-weight:500;}
.ph{color:#a32d2d;font-weight:500;}
.pm{color:#854f0b;font-weight:500;}
.pg{color:#3b6d11;font-weight:500;}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;cursor:pointer;font-size:13px;font-family:inherit;}
.btn:hover{background:#f5f5f3;}
.btndk{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.btnsm{padding:5px 11px;font-size:12px;border-radius:6px;}
.avt{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;}
.sc{background:#fff;border:1px solid #e5e5e3;border-radius:12px;margin-bottom:10px;overflow:hidden;}
.sc-top{padding:1rem;cursor:pointer;display:flex;align-items:center;gap:12px;}
.sc-top:hover{background:#fafafa;}
.sc-link{padding:10px 14px;background:#f9f9f7;display:flex;align-items:center;gap:8px;border-top:1px solid #f0f0ee;}
.yt{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.ytb{padding:5px 12px;border-radius:6px;border:1px solid #ddd;background:#fff;font-size:12px;cursor:pointer;color:#666;}
.ytb.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.rv{display:flex;gap:6px;}
.rvb{padding:6px 13px;border-radius:6px;border:1px solid #ddd;background:#fff;font-size:12px;cursor:pointer;color:#666;}
.rvb.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.ins{padding:12px 14px;border-radius:8px;font-size:12px;line-height:1.6;}
.ins-g{background:#eaf3de;color:#27500a;}
.ins-a{background:#faeeda;color:#633806;}
.ins-r{background:#fcebeb;color:#7a1f1f;}
.mbar{margin-bottom:14px;}
.mbar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
.mbar-label{font-size:12px;font-weight:500;width:36px;flex-shrink:0;}
.mbar-val{font-size:13px;font-weight:500;flex:1;}
.mbar-badge{font-size:11px;padding:2px 8px;border-radius:4px;}
.mbar-track{height:8px;background:#f0f0ee;border-radius:4px;position:relative;}
.mbar-fill{height:8px;border-radius:4px;}
.mbar-line{position:absolute;top:-3px;width:2px;height:14px;background:#854f0b;border-radius:1px;}
.loading{text-align:center;padding:3rem;color:#aaa;}
.spinner{width:32px;height:32px;border:3px solid #e5e5e3;border-top-color:#1a1a1a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}
@media print{.topbar,.noprint{display:none!important;}.page{display:none!important;}#pg-report{display:block!important;}body{background:#fff;}}
@media(max-width:900px){.dash-tbl{display:none!important;}.dash-cards{display:block!important;}}
@media(max-width:768px){
  .app{padding:.75rem;}.topbar{padding:0 .75rem;}.brand{font-size:13px;margin-right:.75rem;}
  .tab{padding:.75rem .6rem;font-size:12px;}.g2,.g3,.g4{grid-template-columns:1fr 1fr;}
  .rv{gap:4px;}.rvb{padding:5px 8px;font-size:11px;}.yt{gap:4px;}.ytb{padding:4px 8px;font-size:11px;}
  th,td{padding:6px 6px;font-size:11px;}
}
@media(max-width:480px){.g2,.g3,.g4{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="topbar noprint">
  <div class="brand">Castle Hill <span>Barbershop</span></div>
  <div class="tab on" onclick="showPage('dash')" id="t-dash">Dashboard</div>
  <div class="tab" onclick="showPage('staff')" id="t-staff">Staff</div>
  <div style="margin-left:auto;font-size:11px;color:#aaa;" id="upd"></div>
</div>
<div class="app">

<div class="page on" id="pg-dash">
  <div id="dash-loading" class="loading"><div class="spinner"></div>Loading live data from Google Sheets...</div>
  <div id="dash-content" style="display:none;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;">
      <div><div style="font-size:20px;font-weight:600;">Staff performance</div><div style="font-size:12px;color:#888;margin-top:2px;">Castle Hill · Live from Google Sheets</div></div>
      <div class="yt" id="dash-yt"></div>
    </div>
    <div class="g4" id="dash-met" style="margin-bottom:1rem;"></div>
    <div class="g2" style="margin-bottom:1rem;">
      <div class="card"><div class="sl">Monthly turnover by staff</div><div style="position:relative;height:220px;"><canvas id="dc1" role="img" aria-label="Monthly turnover"></canvas></div></div>
      <div class="card"><div class="sl">Avg wage % vs 45% target</div><div style="position:relative;height:220px;"><canvas id="dc2" role="img" aria-label="Wage percentage"></canvas></div></div>
    </div>
    <div class="card0">
      <div style="padding:12px 14px;border-bottom:1px solid #e5e5e3;font-size:13px;font-weight:600;">Staff overview — tap to view full report</div>
      <div class="dash-tbl" style="overflow-x:auto;"><table id="dash-tbl-body"></table></div>
      <div class="dash-cards" style="display:none;padding:12px;" id="dash-cards"></div>
    </div>
  </div>
</div>

<div class="page" id="pg-staff">
  <div style="font-size:20px;font-weight:600;margin-bottom:1rem;">All staff</div>
  <div id="staff-list"></div>
</div>

<div class="page" id="pg-report">
  <div class="noprint" style="display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap;">
    <button class="btn btnsm" onclick="showPage('staff')">← Back</button>
    <div style="flex:1;font-size:17px;font-weight:600;" id="rname"></div>
    <div class="yt" id="rep-yt" style="margin-bottom:0;"></div>
    <div class="rv">
      <div class="rvb on" onclick="switchView('int')" id="rv-int">Internal</div>
      <div class="rvb" onclick="switchView('stf')" id="rv-stf">Staff view</div>
    </div>
    <button class="btn btndk btnsm" onclick="window.print()">Print</button>
  </div>
  <div id="v-int"></div>
  <div id="v-stf" style="display:none;"></div>
</div>

</div>
<script>
// Register datalabels plugin only for specific charts
Chart.register(ChartDataLabels);

// ============================================================
// LIVE DATA FROM GOOGLE SHEETS
// ============================================================
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwn0aLRKYrBwcBISrP6GSM-ezd9Ei9bdXily8WyX24FJIKGoYpiWtBXr3tmny3AUtsg/exec';

const STAFF_COLORS = {
  'ronald':  {bg:'#E6F1FB',fg:'#0C447C'},
  'mona':    {bg:'#E1F5EE',fg:'#085041'},
  'helen':   {bg:'#FAEEDA',fg:'#633806'},
  'majid':   {bg:'#EEEDFE',fg:'#3C3489'},
  'jeni':    {bg:'#FCEBEB',fg:'#791F1F'},
  'radi':    {bg:'#F1EFE8',fg:'#444441'},
  'hamilton':{bg:'#FBEAF0',fg:'#72243E'},
};
const DEFAULT_COLORS = ['#E6F1FB:#0C447C','#E1F5EE:#085041','#FAEEDA:#633806','#EEEDFE:#3C3489','#FCEBEB:#791F1F','#F1EFE8:#444441','#FBEAF0:#72243E'];

const MO=['Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar','Apr','May','Jun'];
let ALL_DATA = []; // raw rows from sheet
let STAFF_LIST = []; // unique staff names
let curYear='2025-26', curStaff=null, curView='int', charts={};

function getColor(name) {
  const key = name.toLowerCase().replace(/\s/g,'');
  if(STAFF_COLORS[key]) return STAFF_COLORS[key];
  const idx = STAFF_LIST.indexOf(name) % DEFAULT_COLORS.length;
  const parts = DEFAULT_COLORS[Math.max(0,idx)].split(':');
  return {bg:parts[0], fg:parts[1]};
}

function $f(n){if(n==null||isNaN(n))return'-';return(n<0?'-$':'$')+Math.abs(Math.round(n)).toLocaleString();}
function $p(n){if(n==null||isNaN(n))return'-';return Math.round(n)+'%';}
function ini(name){return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function pc(p){return p>100?'ph':p>60?'pm':'pg';}
function prof(p){return p>=0?'pos':'neg';}
function killCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}

// Parse date string to get year and month
function parseDate(d) {
  if(!d) return null;
  const s = d.toString().trim();
  // Try DD-Mon-YYYY or D-Mon-YYYY (e.g. 22-May-2026)
  const m1 = s.match(/(\d{1,2})[-\/]([A-Za-z]+)[-\/](\d{4})/);
  if(m1) {
    const months = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
    const mo = months[m1[2].toLowerCase().slice(0,3)];
    if(mo !== undefined) return new Date(parseInt(m1[3]), mo, parseInt(m1[1]));
  }
  // Try YYYY-MM-DD
  const m2 = s.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
  if(m2) return new Date(parseInt(m2[1]), parseInt(m2[2])-1, parseInt(m2[3]));
  // Google Sheets date serial or ISO - use UTC to avoid timezone shift
  if(s.includes('T')) {
    const parts = s.split('T')[0].split('-');
    if(parts.length===3) return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  }
  return null;
}

function fmtDate(dt) {
  if(!dt) return '';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return dt.getDate()+' '+months[dt.getMonth()]+' '+dt.getFullYear();
}

function fmtDateShort(dt) {
  if(!dt) return '';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return dt.getDate()+' '+months[dt.getMonth()];
}

function fmtHours(h) {
  if(!h) return '-';
  const s = h.toString().trim();
  // Already in HH:MM format
  if(s.match(/^\d+:\d+$/)) return s;
  // Google Sheets time serial (fraction of day) or ISO time
  if(s.includes('T')) {
    const time = s.split('T')[1];
    if(time) {
      const parts = time.split(':');
      return parts[0]+':'+parts[1];
    }
  }
  // Decimal hours
  const n = parseFloat(s);
  if(!isNaN(n) && n < 2) {
    // Fraction of day
    const totalMins = Math.round(n * 24 * 60);
    const hrs = Math.floor(totalMins/60);
    const mins = totalMins % 60;
    return hrs+':'+(mins<10?'0':'')+mins;
  }
  return s;
}

function getFinYear(dt) {
  if(!dt) return null;
  const y = dt.getFullYear(), m = dt.getMonth();
  // Financial year Jul-Jun
  if(m >= 6) return `${y}-${String(y+1).slice(2)}`;
  return `${y-1}-${String(y).slice(2)}`;
}

function getMonthName(dt) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[dt.getMonth()];
}

function calcRow(r) {
  const tc = r.wage + r.opexp;
  const wp = r.turnover > 0 ? (r.wage/r.turnover)*100 : 999;
  const cp = r.turnover > 0 ? (tc/r.turnover)*100 : 999;
  const pr = r.turnover - tc;
  const displayDate = r.dt ? fmtDate(r.dt) : r.date.toString();
  const displayHours = fmtHours(r.hours);
  return {...r, tc, wp, cp, pr, displayDate, displayHours};
}

function getStaffData(name, year) {
  return ALL_DATA
    .filter(r => r.staff.toLowerCase() === name.toLowerCase() && r.year === year)
    .map(calcRow)
    .sort((a,b) => a.dt - b.dt);
}

function getAllYears() {
  const y = new Set(ALL_DATA.map(r=>r.year).filter(Boolean));
  return [...y].sort();
}

function getStaffYears(name) {
  const y = new Set(ALL_DATA.filter(r=>r.staff.toLowerCase()===name.toLowerCase()).map(r=>r.year).filter(Boolean));
  return [...y].sort();
}

// ============================================================
// LOAD DATA FROM GOOGLE SHEETS
// ============================================================
async function loadData() {
  try {
    const resp = await fetch(SHEET_URL);
    const rows = await resp.json();
    
    ALL_DATA = rows.map(r => {
      const dt = parseDate(r.date);
      return {
        staff: r.staff,
        date: r.date,
        dt: dt,
        year: getFinYear(dt),
        month: dt ? getMonthName(dt) : null,
        turnover: parseFloat(r.turnover) || 0,
        wage: parseFloat(r.wage) || 0,
        opexp: parseFloat(r.opexp) || 0,
        hours: r.hours || ''
      };
    }).filter(r => r.staff && r.dt && r.turnover > 0);

    STAFF_LIST = [...new Set(ALL_DATA.map(r=>r.staff))].sort();
    
    // Set current year to most recent
    const years = getAllYears();
    if(years.length) curYear = years[years.length-1];
    
    document.getElementById('dash-loading').style.display='none';
    document.getElementById('dash-content').style.display='block';
    document.getElementById('upd').textContent = 'Live · Updated: '+new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
    
    buildDash();
    
  } catch(e) {
    document.getElementById('dash-loading').innerHTML = `
      <div style="color:#a32d2d;padding:2rem;">
        <div style="font-size:16px;font-weight:600;margin-bottom:8px;">Could not load data</div>
        <div style="font-size:13px;margin-bottom:12px;">Make sure your Google Sheet "Weekly Data" tab has data and the Apps Script is deployed correctly.</div>
        <div style="font-size:11px;color:#aaa;">Error: ${e.message}</div>
        <button onclick="loadData()" style="margin-top:12px;padding:8px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;">Try again</button>
      </div>`;
  }
}

// ============================================================
// NAVIGATION
// ============================================================
function showPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('on'));
  document.getElementById('pg-'+p).classList.add('on');
  const t=document.getElementById('t-'+p);if(t)t.classList.add('on');
  killCharts();
  if(p==='dash')buildDash();
  if(p==='staff')buildStaffList();
}

// ============================================================
// DASHBOARD
// ============================================================
function buildDash(){
  const years = getAllYears();
  document.getElementById('dash-yt').innerHTML = years.map(y=>`<div class="ytb${y===curYear?' on':''}" onclick="setDY('${y}')">${y}</div>`).join('');

  const yw = ALL_DATA.filter(r=>r.year===curYear).map(calcRow);
  const totTO = yw.reduce((a,r)=>a+r.turnover,0);
  const totPr = yw.reduce((a,r)=>a+r.pr,0);
  const avgWP = yw.length ? yw.reduce((a,r)=>a+r.wp,0)/yw.length : 0;
  const staffWithData = STAFF_LIST.filter(s=>getStaffData(s,curYear).length>0);

  document.getElementById('dash-met').innerHTML=`
    <div class="met"><div class="ml">Staff with data</div><div class="mv">${staffWithData.length}</div><div class="ms">of ${STAFF_LIST.length} total</div></div>
    <div class="met"><div class="ml">Total turnover</div><div class="mv">${$f(totTO)}</div><div class="ms">${curYear}</div></div>
    <div class="met" style="background:${totPr>=0?'#eaf3de':'#fcebeb'};"><div class="ml" style="color:${totPr>=0?'#3b6d11':'#a32d2d'};">Net profit/loss</div><div class="mv" style="color:${totPr>=0?'#3b6d11':'#a32d2d'};">${$f(totPr)}</div></div>
    <div class="met"><div class="ml">Avg wage %</div><div class="mv" style="color:${avgWP>45?'#a32d2d':'#3b6d11'};">${$p(avgWP)}</div><div class="ms">target: 45%</div></div>`;

  // Table
  let th='<thead><tr><th style="text-align:left;">Staff</th><th>Weeks</th><th>Total turnover</th><th>Avg/week</th><th>Avg wage%</th><th>Avg cost%</th><th>Total profit/loss</th></tr></thead><tbody>';
  let cards='';
  
  STAFF_LIST.forEach(s=>{
    const w = getStaffData(s, curYear);
    const c = getColor(s);
    if(!w.length){
      th+=`<tr><td><div style="display:flex;align-items:center;gap:8px;"><div class="avt" style="background:${c.bg};color:${c.fg};width:28px;height:28px;font-size:11px;">${ini(s)}</div>${s}</div></td><td colspan="6" style="color:#bbb;text-align:left;">No data for ${curYear}</td></tr>`;
      cards+=`<div class="sc"><div class="sc-top"><div class="avt" style="background:${c.bg};color:${c.fg};">${ini(s)}</div><div style="flex:1;"><div style="font-size:13px;font-weight:600;">${s}</div><div style="font-size:11px;color:#aaa;">No data for ${curYear}</div></div></div></div>`;
      return;
    }
    const totTO=w.reduce((a,r)=>a+r.turnover,0),totPr=w.reduce((a,r)=>a+r.pr,0);
    const awp=w.reduce((a,r)=>a+r.wp,0)/w.length,acp=w.reduce((a,r)=>a+r.cp,0)/w.length;
    const pc2=totPr>=0?'#3b6d11':'#a32d2d',bg2=totPr>=0?'#eaf3de':'#fcebeb';
    const shareLink=`https://AllanMensHairdressing.github.io/castle-hill-portal/${s.toLowerCase().replace(/\s/g,'')}.html`;
    
    th+=`<tr style="cursor:pointer;" onclick="openReport('${s}')"><td><div style="display:flex;align-items:center;gap:8px;"><div class="avt" style="background:${c.bg};color:${c.fg};width:28px;height:28px;font-size:11px;">${ini(s)}</div>${s}</div></td><td>${w.length}</td><td>${$f(totTO)}</td><td>${$f(Math.round(totTO/w.length))}</td><td class="${pc(awp)}">${$p(awp)}</td><td class="${pc(acp)}">${$p(acp)}</td><td class="${prof(totPr)}">${$f(totPr)}</td></tr>`;
    
    cards+=`<div class="sc">
      <div class="sc-top" onclick="openReport('${s}')">
        <div class="avt" style="background:${c.bg};color:${c.fg};">${ini(s)}</div>
        <div style="flex:1;"><div style="font-size:14px;font-weight:600;">${s}</div><div style="font-size:11px;color:#aaa;">${w.length} weeks · avg wage ${$p(awp)}</div></div>
        <div style="text-align:right;"><div style="font-size:13px;font-weight:600;">${$f(Math.round(totTO/w.length))}<span style="font-size:11px;font-weight:400;color:#aaa;">/wk</span></div><div style="font-size:11px;padding:2px 6px;border-radius:4px;background:${bg2};color:${pc2};margin-top:2px;">${$f(totPr)}</div></div>
      </div>
    </div>`;
  });
  th+='</tbody>';
  document.getElementById('dash-tbl-body').innerHTML=th;
  document.getElementById('dash-cards').innerHTML=cards;

  setTimeout(()=>{
    const swd = STAFF_LIST.filter(s=>getStaffData(s,curYear).length>0);
    const c1=document.getElementById('dc1');
    if(c1){
      const datasets = swd.map(s=>{
        const c=getColor(s);
        const byMonth={};
        MO.forEach(m=>{
          const mw=ALL_DATA.filter(r=>r.staff.toLowerCase()===s.toLowerCase()&&r.year===curYear&&r.month===m).map(calcRow);
          if(mw.length) byMonth[m]=mw.reduce((a,r)=>a+r.turnover,0)/mw.length;
        });
        return{label:s,data:MO.map(m=>byMonth[m]||null),backgroundColor:c.fg+'cc',borderRadius:2};
      });
      charts.d1=new Chart(c1,{type:'bar',data:{labels:MO,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{font:{size:10},boxWidth:8}},datalabels:{display:false}},scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{ticks:{font:{size:10},callback:v=>'$'+Math.round(v/1000)+'k'},grid:{color:'rgba(0,0,0,0.04)'}}}}});
    }
    const c2=document.getElementById('dc2');
    if(c2&&swd.length){
      const avgs=swd.map(s=>{const w=getStaffData(s,curYear);return w.length?Math.round(w.reduce((a,r)=>a+r.wp,0)/w.length):0;});
      charts.d2=new Chart(c2,{type:'bar',data:{labels:swd.map(s=>s),datasets:[{data:avgs,backgroundColor:avgs.map(v=>v>60?'#E24B4A':v>45?'#EF9F27':'#639922'),borderRadius:4,datalabels:{display:true}},{label:'Target',data:swd.map(()=>45),type:'line',borderColor:'#854F0B',borderDash:[4,4],pointRadius:0,borderWidth:1.5,datalabels:{display:false}}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{color:'#fff',font:{size:11,weight:'bold'},formatter:v=>v+'%',anchor:'center',align:'center'}},scales:{x:{ticks:{font:{size:11}},grid:{display:false}},y:{ticks:{font:{size:10},callback:v=>v+'%'},grid:{color:'rgba(0,0,0,0.04)'},min:0,max:120}}}});
    }
  },100);
}

function setDY(y){curYear=y;killCharts();buildDash();}

// ============================================================
// STAFF LIST
// ============================================================
function buildStaffList(){
  document.getElementById('staff-list').innerHTML=STAFF_LIST.map(s=>{
    const c=getColor(s);
    const years=getStaffYears(s);
    const lat=years[years.length-1]||curYear;
    const w=getStaffData(s,lat);
    const totTO=w.reduce((a,r)=>a+r.turnover,0),totPr=w.reduce((a,r)=>a+r.pr,0);
    const awp=w.length?Math.round(w.reduce((a,r)=>a+r.wp,0)/w.length):0;
    const pc2=totPr>=0?'#3b6d11':'#a32d2d',bg2=totPr>=0?'#eaf3de':'#fcebeb';
    const shareLink=`https://AllanMensHairdressing.github.io/castle-hill-portal/${s.toLowerCase().replace(/\s/g,'')}.html`;
    return `<div class="sc">
      <div class="sc-top" onclick="openReport('${s}')">
        <div class="avt" style="background:${c.bg};color:${c.fg};">${ini(s)}</div>
        <div style="flex:1;"><div style="font-size:14px;font-weight:600;">${s}</div><div style="font-size:11px;color:#aaa;">${years.length} year${years.length!==1?'s':''} · ${w.length} weeks (${lat})</div></div>
        <div style="text-align:right;">
          <div style="font-size:13px;font-weight:600;">${w.length?$f(Math.round(totTO/w.length)):'-'}<span style="font-size:11px;font-weight:400;color:#aaa;">/wk</span></div>
          <div style="font-size:11px;padding:2px 6px;border-radius:4px;background:${bg2};color:${pc2};margin-top:2px;">${$f(totPr)}</div>
        </div>
      </div>
      <div class="sc-link">
        <span style="font-size:11px;color:#888;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${shareLink}</span>
        <button onclick="copyLink('${shareLink}','${s}')" style="font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid #185FA5;background:#185FA5;color:#fff;cursor:pointer;white-space:nowrap;flex-shrink:0;">Copy link</button>
        <a href="${shareLink}" target="_blank" style="font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#1a1a1a;text-decoration:none;white-space:nowrap;flex-shrink:0;">Open</a>
      </div>
    </div>`;
  }).join('');
}

function copyLink(url,name){
  navigator.clipboard.writeText(url).then(()=>{
    alert(name+"'s personal report link copied!\n\n"+url+"\n\nSend this to "+name+" via WhatsApp or email.");
  }).catch(()=>{prompt("Copy this link for "+name+":",url);});
}

// ============================================================
// REPORT
// ============================================================
function openReport(name){
  curStaff=name;
  const sy=getStaffYears(name);
  curYear=sy[sy.length-1]||'2025-26';
  document.getElementById('rname').textContent=name;
  document.getElementById('rep-yt').innerHTML=sy.map(y=>`<div class="ytb${y===curYear?' on':''}" onclick="setRY('${y}')">${y}</div>`).join('');
  buildReport();
  showPage('report');
  switchView('int');
}

function setRY(y){curYear=y;document.querySelectorAll('#rep-yt .ytb').forEach(t=>t.classList.toggle('on',t.textContent===y));killCharts();buildReport();switchView(curView);}

function buildReport(){
  const weeks=getStaffData(curStaff,curYear);
  if(!weeks.length){document.getElementById('v-int').innerHTML='<div class="card" style="text-align:center;padding:2rem;color:#aaa;">No data for this period.</div>';document.getElementById('v-stf').innerHTML='';return;}

  const n=weeks.length;
  const totTO=weeks.reduce((a,w)=>a+w.turnover,0),totW=weeks.reduce((a,w)=>a+w.wage,0),totO=weeks.reduce((a,w)=>a+w.opexp,0),totC=weeks.reduce((a,w)=>a+w.tc,0),totPr=weeks.reduce((a,w)=>a+w.pr,0);
  const avgTO=Math.round(totTO/n),avgW=Math.round(totW/n),avgO=Math.round(totO/n),avgC=Math.round(totC/n),avgPr=Math.round(totPr/n);
  const awp=Math.round(totTO>0?(totW/totTO)*100:0),acp=Math.round(totTO>0?(totC/totTO)*100:0);
  const bk=Math.ceil(avgC);
  const best=weeks.reduce((a,w)=>w.turnover>a.turnover?w:a,weeks[0]);
  const hit=weeks.filter(w=>w.turnover>=bk).length,hitp=Math.round((hit/n)*100);

  // Monthly data
  const monthData=MO.map(m=>{
    const mw=ALL_DATA.filter(r=>r.staff.toLowerCase()===curStaff.toLowerCase()&&r.year===curYear&&r.month===m).map(calcRow);
    if(!mw.length)return null;
    const mTO=mw.reduce((a,w)=>a+w.turnover,0),mW=mw.reduce((a,w)=>a+w.wage,0),mO=mw.reduce((a,w)=>a+w.opexp,0),mC=mw.reduce((a,w)=>a+w.tc,0),mPr=mw.reduce((a,w)=>a+w.pr,0);
    return{m,mn:mw.length,mTO,mW,mO,mC,mPr,mWP:mTO>0?(mW/mTO)*100:0,mCP:mTO>0?(mC/mTO)*100:0,avg:Math.round(mTO/mw.length),avgW:Math.round(mW/mw.length),avgPr:Math.round(mPr/mw.length)};
  }).filter(Boolean);

  let mRows=monthData.map(d=>`<tr>
    <td style="font-weight:500;">${d.m}</td><td>${d.mn}</td><td>${$f(d.mTO)}</td>
    <td style="font-weight:500;">${$f(d.avg)}</td><td>${$f(d.mW)}</td><td>${$f(d.mO)}</td>
    <td class="${pc(d.mWP)}">${$p(d.mWP)}</td><td class="${pc(d.mCP)}">${$p(d.mCP)}</td>
    <td class="${prof(d.mPr)}">${$f(d.mPr)}</td>
  </tr>`).join('');

  let mBars=monthData.map(d=>{
    const bp=Math.min((d.avg/bk)*100,100);
    const col=d.avg>=bk?'#639922':d.avg>=bk*0.85?'#EF9F27':'#E24B4A';
    const bg=d.avg>=bk?'#eaf3de':d.avg>=bk*0.85?'#faeeda':'#fcebeb';
    const fg=d.avg>=bk?'#3b6d11':d.avg>=bk*0.85?'#854f0b':'#a32d2d';
    const prCol=d.avgPr>=0?'#3b6d11':'#a32d2d';
    const pctOfTarget=Math.round((d.avg/bk)*100);
    return`<div class="mbar">
      <div class="mbar-row">
        <span class="mbar-label">${d.m}</span>
        <span class="mbar-val">${$f(d.avg)}<span style="font-size:11px;font-weight:400;color:#aaa;">/wk · wage ${$f(d.avgW)} · profit <span style="color:${prCol};">${$f(d.avgPr)}</span></span></span>
        <span style="font-size:11px;font-weight:600;color:${fg};min-width:36px;text-align:right;">${pctOfTarget}%</span>
        <span class="mbar-badge" style="background:${bg};color:${fg};">${d.avg>=bk?'Target met':d.avg>=bk*0.85?'Close':'Below target'}</span>
      </div>
      <div class="mbar-track"><div class="mbar-fill" style="width:${bp}%;background:${col};"></div><div class="mbar-line" style="left:min(99%,99%);"></div></div>
    </div>`;
  }).join('');

  document.getElementById('v-int').innerHTML=`
    <div class="g4" style="margin-bottom:1rem;">
      <div class="met"><div class="ml">Total turnover</div><div class="mv">${$f(totTO)}</div><div class="ms">${n} weeks</div></div>
      <div class="met"><div class="ml">Total wages</div><div class="mv">${$f(totW)}</div><div class="ms">${awp}% of turnover</div></div>
      <div class="met"><div class="ml">Total op. exp.</div><div class="mv">${$f(totO)}</div></div>
      <div class="met" style="background:${totPr>=0?'#eaf3de':'#fcebeb'};"><div class="ml" style="color:${totPr>=0?'#3b6d11':'#a32d2d'};">Net profit/loss</div><div class="mv" style="color:${totPr>=0?'#3b6d11':'#a32d2d'};">${$f(totPr)}</div><div class="ms" style="color:${totPr>=0?'#639922':'#e24b4a'};">${$f(avgPr)}/wk avg</div></div>
    </div>
    <div class="card0" style="margin-bottom:1rem;">
      <div style="padding:12px 14px;border-bottom:1px solid #e5e5e3;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:13px;font-weight:600;">Monthly breakdown — ${curYear}</span><span style="font-size:11px;color:#aaa;">Breakeven: ${$f(bk)}/wk</span></div>
      <div style="overflow-x:auto;"><table>
        <thead><tr><th style="text-align:left;min-width:45px;">Month</th><th>Wks</th><th>Turnover</th><th>Avg/wk</th><th>Wages</th><th>Op.exp</th><th>Wage%</th><th>Cost%</th><th>Profit/loss</th></tr></thead>
        <tbody>${mRows}</tbody>
      </table></div>
    </div>
    <div class="card" style="margin-bottom:1rem;">
      <div class="sl" style="margin-bottom:12px;">Monthly avg vs breakeven (${$f(bk)}/wk)</div>
      ${mBars}
    </div>
    <div class="card0" style="margin-bottom:1rem;">
      <div style="padding:12px 14px;border-bottom:1px solid #e5e5e3;display:flex;justify-content:space-between;"><span style="font-size:13px;font-weight:600;">Weekly breakdown</span><span style="font-size:11px;color:#aaa;">${curYear}</span></div>
      <div style="overflow-x:auto;"><table>
        <thead><tr><th style="text-align:left;min-width:100px;">Week</th><th>Turnover</th><th>Hrs</th><th>Wage</th><th>Op.exp</th><th>Total cost</th><th>Wage%</th><th>Cost%</th><th>Profit/loss</th></tr></thead>
        <tbody>
          ${weeks.map(w=>`<tr><td>${w.displayDate}</td><td>${$f(w.turnover)}</td><td>${w.displayHours}</td><td>${$f(w.wage)}</td><td>${$f(w.opexp)}</td><td>${$f(w.tc)}</td><td class="${pc(w.wp)}">${$p(w.wp)}</td><td class="${pc(w.cp)}">${$p(w.cp)}</td><td class="${prof(w.pr)}">${$f(w.pr)}</td></tr>`).join('')}
          <tr class="tr"><td>Total</td><td>${$f(totTO)}</td><td>-</td><td>${$f(totW)}</td><td>${$f(totO)}</td><td>${$f(totC)}</td><td class="${pc(awp)}">${$p(awp)}</td><td class="${pc(acp)}">${$p(acp)}</td><td class="${prof(totPr)}">${$f(totPr)}</td></tr>
          <tr class="ar"><td>Average/week</td><td>${$f(avgTO)}</td><td>-</td><td>${$f(avgW)}</td><td>${$f(avgO)}</td><td>${$f(avgC)}</td><td class="${pc(awp)}">${$p(awp)}</td><td class="${pc(acp)}">${$p(acp)}</td><td class="${prof(avgPr)}">${$f(avgPr)}</td></tr>
        </tbody>
      </table></div>
    </div>
    <div class="g2" style="margin-bottom:1rem;">
      <div class="card"><div class="sl">Turnover vs cost (weekly)</div><div style="position:relative;height:180px;"><canvas id="rc1" role="img" aria-label="Chart"></canvas></div></div>
      <div class="card"><div class="sl">Cost % trend</div><div style="position:relative;height:180px;"><canvas id="rc2" role="img" aria-label="Chart"></canvas></div></div>
    </div>
    <div class="card" style="margin-bottom:1rem;">
      <div class="g3">
        <div class="met"><div class="ml">Avg turnover/week</div><div class="mv">${$f(avgTO)}</div></div>
        <div class="met"><div class="ml">Avg wage/week</div><div class="mv">${$f(avgW)}</div><div class="ms" style="color:${awp>45?'#a32d2d':'#3b6d11'};">${awp}% of turnover</div></div>
        <div class="met" style="background:${avgPr>=0?'#eaf3de':'#fcebeb'};"><div class="ml" style="color:${avgPr>=0?'#3b6d11':'#a32d2d'};">Avg profit/week</div><div class="mv" style="color:${avgPr>=0?'#3b6d11':'#a32d2d'};">${$f(avgPr)}</div></div>
      </div>
      <div class="ins ins-a" style="margin-top:10px;"><strong>Breakeven:</strong> ${curStaff} needs <strong>${$f(bk)}/week</strong> to cover all costs.</div>
    </div>`;

  // Staff view
  const maxB=Math.max(...weeks.map(w=>w.turnover),bk)*1.15;
  const wkBars=weeks.map(w=>{
    const bp=Math.min((w.turnover/maxB)*100,100),tp=Math.min((bk/maxB)*100,100);
    const hit2=w.turnover>=bk,close=w.turnover>=bk*0.85;
    const col=hit2?'#639922':close?'#EF9F27':'#E24B4A',bg=hit2?'#eaf3de':close?'#faeeda':'#fcebeb',fg=hit2?'#3b6d11':close?'#854f0b':'#a32d2d';
    return`<div class="mbar"><div class="mbar-row"><span style="font-size:12px;color:#888;width:110px;flex-shrink:0;">${w.displayDate}</span><span class="mbar-val">${$f(w.turnover)}</span><span class="mbar-badge" style="background:${bg};color:${fg};">${hit2?'Target met':close?'Close':'Below'}</span></div><div class="mbar-track"><div class="mbar-fill" style="width:${bp}%;background:${col};"></div><div class="mbar-line" style="left:${tp}%;"></div></div></div>`;
  }).join('');

  const c=getColor(curStaff);
  document.getElementById('v-stf').innerHTML=`
    <div class="card" style="margin-bottom:1rem;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #f0f0ee;">
        <div class="avt" style="width:48px;height:48px;font-size:16px;background:${c.bg};color:${c.fg};">${ini(curStaff)}</div>
        <div><div style="font-size:17px;font-weight:600;">${curStaff}</div><div style="font-size:12px;color:#aaa;">Castle Hill · ${curYear} · ${n} weeks</div></div>
      </div>
      <div class="g3" style="margin-bottom:12px;">
        <div class="met"><div class="ml">Avg turnover/week</div><div class="mv">${$f(avgTO)}</div><div class="ms">${n} weeks recorded</div></div>
        <div class="met"><div class="ml">Best week</div><div class="mv" style="color:#3b6d11;">${$f(best.turnover)}</div><div class="ms">${best.date}</div></div>
        <div class="met" style="background:${totPr>=0?'#eaf3de':'#fcebeb'};"><div class="ml" style="color:${totPr>=0?'#3b6d11':'#a32d2d'};">Total profit/loss</div><div class="mv" style="color:${totPr>=0?'#3b6d11':'#a32d2d'};">${$f(totPr)}</div></div>
      </div>
      <div class="g3">
        <div class="met"><div class="ml">Avg wage/week</div><div class="mv">${$f(avgW)}</div><div class="ms" style="color:${awp>45?'#a32d2d':'#3b6d11'};">${awp}% of turnover</div></div>
        <div class="met"><div class="ml">Weekly target</div><div class="mv" style="color:#854f0b;">${$f(bk)}</div><div class="ms">to cover all costs</div></div>
        <div class="met" style="background:${avgPr>=0?'#eaf3de':'#fcebeb'};"><div class="ml" style="color:${avgPr>=0?'#3b6d11':'#a32d2d'};">Avg profit/week</div><div class="mv" style="color:${avgPr>=0?'#3b6d11':'#a32d2d'};">${$f(avgPr)}</div></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:1rem;"><div class="sl" style="margin-bottom:12px;">Monthly performance vs target</div>${mBars}</div>
    <div class="card" style="margin-bottom:1rem;"><div class="sl" style="margin-bottom:12px;">Weekly performance vs target (${$f(bk)})</div>${wkBars}</div>
    <div class="card" style="margin-bottom:1rem;"><div class="sl">Turnover trend</div><div style="position:relative;height:200px;"><canvas id="sc1" role="img" aria-label="Trend"></canvas></div></div>
    <div class="ins ${hitp>=70?'ins-g':hitp>=40?'ins-a':'ins-r'}" style="margin-top:1rem;"><strong>Summary:</strong> You hit target in <strong>${hit} of ${n} weeks</strong> (${hitp}%). ${hitp>=70?'Excellent — keep it up!':hitp>=40?`Aim for ${$f(bk)} or more every week.`:`Your best week was ${$f(best.turnover)} — aim for that consistently.`}</div>`;

  window._rd={weeks,bk};
}

function switchView(v){
  curView=v;
  document.getElementById('v-int').style.display=v==='int'?'block':'none';
  document.getElementById('v-stf').style.display=v==='stf'?'block':'none';
  document.getElementById('rv-int').classList.toggle('on',v==='int');
  document.getElementById('rv-stf').classList.toggle('on',v==='stf');
  killCharts();
  setTimeout(()=>renderCharts(v),80);
}

function renderCharts(v){
  if(!window._rd)return;
  const{weeks,bk}=window._rd;
  const labs=weeks.map(w=>w.dt?fmtDateShort(w.dt):w.date.toString());
  if(v==='int'){
    const c1=document.getElementById('rc1'),c2=document.getElementById('rc2');
    if(c1)charts.rc1=new Chart(c1,{type:'bar',data:{labels:labs,datasets:[{label:'Turnover',data:weeks.map(w=>w.turnover),backgroundColor:'#378ADD',borderRadius:2},{label:'Cost',data:weeks.map(w=>w.tc),backgroundColor:'#E24B4A',borderRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:false}},scales:{x:{ticks:{font:{size:10},autoSkip:true,maxTicksLimit:10},grid:{display:false}},y:{ticks:{font:{size:10},callback:v=>'$'+Math.round(v/1000)+'k'},grid:{color:'rgba(0,0,0,0.04)'}}}}});;
    if(c2)charts.rc2=new Chart(c2,{type:'line',data:{labels:labs,datasets:[{data:weeks.map(w=>Math.round(w.cp)),borderColor:'#E24B4A',backgroundColor:'rgba(226,75,74,0.07)',tension:0.3,pointRadius:2,fill:true},{data:weeks.map(()=>100),borderColor:'#639922',borderDash:[4,4],pointRadius:0,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},autoSkip:true,maxTicksLimit:10},grid:{display:false}},y:{ticks:{font:{size:10},callback:v=>v+'%'},grid:{color:'rgba(0,0,0,0.04)'},min:0}}}});
  }
  if(v==='stf'){
    const c1=document.getElementById('sc1');
    if(c1)charts.sc1=new Chart(c1,{type:'line',data:{labels:labs,datasets:[{data:weeks.map(w=>w.turnover),borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,0.07)',tension:0.3,pointBackgroundColor:weeks.map(w=>w.turnover>=bk?'#639922':'#E24B4A'),pointRadius:4,fill:true},{data:weeks.map(()=>bk),borderColor:'#854F0B',borderDash:[5,4],pointRadius:0,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},autoSkip:true,maxTicksLimit:10},grid:{display:false}},y:{ticks:{font:{size:10},callback:v=>'$'+Math.round(v/1000)+'k'},grid:{color:'rgba(0,0,0,0.04)'},min:0}}}});
  }
}

// INIT — Load live data

loadData();
</script>
