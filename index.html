.tab{padding:1rem .9rem;font-size:13px;color:#666;cursor:pointer;border-bottom:2px solid transparent;}

.app{max-width:1100px;margin:0 auto;padding:1.25rem;}
.page{display:none;}.page.on{display:block;}

.met{background:#f5f5f3;border-radius:8px;padding:12px 14px;}
.ml{font-size:11px;color:#888;margin-bottom:5px;}
.mv{font-size:20px;font-weight:600;}
.ms{font-size:11px;color:#aaa;margin-top:2px;}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;}
.sl{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#aaa;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{font-size:11px;font-weight:500;color:#888;padding:8px 8px;border-bottom:1px solid #e5e5e3;background:#fafafa;text-align:right;white-space:nowrap;}
th:first-child{text-align:left;}
td{padding:8px 8px;border-bottom:1px solid #f0f0ee;text-align:right;color:#1a1a1a;white-space:nowrap;}
td:first-child{text-align:left;color:#666;}
.tr{font-weight:600;background:#fafafa;}
.ar{font-size:11px;color:#888;background:#f5f5f3;}

.avt{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;}
.sc{background:#fff;border:1px solid #e5e5e3;border-radius:12px;padding:1rem;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.sc:hover{border-color:#aaa;}
.yt{display:flex;gap:6px;margin-bottom:14px;}
.ytb{padding:5px 12px;border-radius:6px;border:1px solid #ddd;background:#fff;font-size:12px;cursor:pointer;color:#666;}
.ytb.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.rv{display:flex;gap:6px;}
.rvb{padding:6px 13px;border-radius:6px;border:1px solid #ddd;background:#fff;font-size:12px;cursor:pointer;color:#666;}
.rvb.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}

.ins-a{background:#faeeda;color:#633806;}

.mbar{margin-bottom:12px;}
.mbar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.mbar-label{font-size:12px;font-weight:500;width:36px;flex-shrink:0;}
.mbar-val{font-size:13px;font-weight:500;flex:1;}
.mbar-badge{font-size:11px;padding:2px 8px;border-radius:4px;}
.mbar-track{height:8px;background:#f0f0ee;border-radius:4px;position:relative;}
.mbar-fill{height:8px;border-radius:4px;}
.mbar-line{position:absolute;top:-3px;width:2px;height:14px;background:#854f0b;border-radius:1px;}
@media print{.topbar,.noprint{display:none!important;}.page{display:none!important;}#pg-report{display:block!important;}body{background:#fff;}}

const MO=['Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar','Apr','May','Jun'];
let curYear='2025-26',curStaff=null,curView='int',charts={};

function $f(n){if(n==null||isNaN(n))return'-';return(n<0?'-$':'$')+Math.abs(Math.round(n)).toLocaleString();}
function $p(n){if(n==null||isNaN(n))return'-';return Math.round(n)+'%';}
function ini(name){return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function pc(p){return p>100?'ph':p>60?'pm':'pg';}
function prof(p){return p>=0?'pos':'neg';}
function cw(w){const tc=w.w+w.o,wp=w.t>0?(w.w/w.t)*100:999,cp=w.t>0?(tc/w.t)*100:999,pr=w.t-tc;return{...w,tc,wp,cp,pr};}
function allW(s,y){let a=[];MO.forEach(m=>{if(s.years[y]&&s.years[y][m])a=a.concat(s.years[y][m].weeks);});return a.map(cw);}
function yrs(s){return Object.keys(s.years).sort();}
function allYrs(){const y=new Set();STAFF.forEach(s=>Object.keys(s.years).forEach(yr=>y.add(yr)));return[...y].sort();}
function killCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}

function showPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('on'));
  document.getElementById('pg-'+p).classList.add('on');
  const t=document.getElementById('t-'+p);if(t)t.classList.add('on');
  killCharts();
  if(p==='dash')buildDash();
  if(p==='staff')buildStaffList();
}

function buildDash(){
  const yrs=allYrs();
  document.getElementById('dash-yt').innerHTML=yrs.map(y=>`<div class="ytb${y===curYear?' on':''}" onclick="setDY('${y}')">${y}</div>`).join('');
  const ws=STAFF.map(s=>allW(s,curYear)).flat();
  const totTO=ws.reduce((a,w)=>a+w.t,0);
  const totPr=ws.reduce((a,w)=>a+w.pr,0);

    th+=`<tr style="cursor:pointer;" onclick="openReport('${s.id}')"><td><div style="display:flex;align-items:center;gap:8px;"><div class="avt" style="background:${s.c.bg};color:${s.c.fg};width:28px;height:28px;font-size:11px;">${ini(s.name)}</div>${s.name}</div></td><td>${w.length}</td><td>${$f(totTO)}</td><td>${$f(Math.round(totTO/w.length))}</td><td class="${pc(awp)}">${$p(awp)}</td><td class="${pc(acp)}">${$p(acp)}</td><td class="${prof(totPr)}">${$f(totPr)}</td></tr>`;
    const pc2=totPr>=0?'#3b6d11':'#a32d2d',bg2=totPr>=0?'#eaf3de':'#fcebeb';
    cards+=`<div class="sc" onclick="openReport('${s.id}')"><div class="avt" style="background:${s.c.bg};color:${s.c.fg};">${ini(s.name)}</div><div style="flex:1;"><div style="font-size:14px;font-weight:600;">${s.name}</div><div style="font-size:11px;color:#aaa;">${w.length} weeks · avg wage ${$p(awp)}</div></div><div style="text-align:right;"><div style="font-size:13px;font-weight:600;">${$f(Math.round(totTO/w.length))}<span style="font-size:11px;font-weight:400;color:#aaa;">/wk</span></div><div style="font-size:11px;padding:2px 6px;border-radius:4px;background:${bg2};color:${pc2};margin-top:2px;">${$f(totPr)}</div></div></div>`;

  },100);
}

function openReport(id){
  curStaff=id;
  const s=STAFF.find(x=>x.id===id);
  const sy=yrs(s);
  curYear=sy[sy.length-1]||'2025-26';
  document.getElementById('rname').textContent=s.name;
  document.getElementById('rep-yt').innerHTML=sy.map(y=>`<div class="ytb${y===curYear?' on':''}" onclick="setRY('${y}')">${y}</div>`).join('');

function buildReport(){
  const s=STAFF.find(x=>x.id===curStaff);
  const weeks=allW(s,curYear);
  if(!weeks.length){document.getElementById('v-int').innerHTML='<div class="card" style="text-align:center;padding:2rem;color:#aaa;">No data for this period.</div>';document.getElementById('v-stf').innerHTML='';return;}
  const totTO=weeks.reduce((a,w)=>a+w.t,0),totW=weeks.reduce((a,w)=>a+w.w,0),totO=weeks.reduce((a,w)=>a+w.o,0),totC=weeks.reduce((a,w)=>a+w.tc,0),totPr=weeks.reduce((a,w)=>a+w.pr,0);
  const n=weeks.length,avgTO=totTO/n,avgW=totW/n,avgO=totO/n,avgC=totC/n,avgPr=totPr/n;
  const awp=totTO>0?(totW/totTO)*100:0,acp=totTO>0?(totC/totTO)*100:0;
  const bk=Math.ceil(avgC);
  const best=weeks.reduce((a,w)=>w.t>a.t?w:a,weeks[0]);

  // Monthly data
  const ydata=s.years[curYear]||{};
  const monthData=MO.filter(m=>ydata[m]).map(m=>{
    const mw=(ydata[m].weeks||[]).map(cw);
    const mn=mw.length,mTO=mw.reduce((a,w)=>a+w.t,0),mW=mw.reduce((a,w)=>a+w.w,0),mO=mw.reduce((a,w)=>a+w.o,0),mC=mw.reduce((a,w)=>a+w.tc,0),mPr=mw.reduce((a,w)=>a+w.pr,0);
    return{m,mn,mTO,mW,mO,mC,mPr,mWP:mTO>0?(mW/mTO)*100:0,mCP:mTO>0?(mC/mTO)*100:0,avg:mTO/mn};
  });

  // Monthly table rows
  let mRows=monthData.map(d=>`<tr>
    <td style="font-weight:500;">${d.m}</td><td>${d.mn}</td><td>${$f(d.mTO)}</td>
    <td style="font-weight:500;">${$f(Math.round(d.avg))}</td>
    <td>${$f(d.mW)}</td><td>${$f(d.mO)}</td>
    <td class="${pc(d.mWP)}">${$p(d.mWP)}</td><td class="${pc(d.mCP)}">${$p(d.mCP)}</td>
    <td class="${prof(d.mPr)}">${$f(d.mPr)}</td>
  </tr>`).join('');

  // Monthly bars
  let mBars=monthData.map(d=>{
    const bp=Math.min((d.avg/bk)*100,100);
    const col=d.avg>=bk?'#639922':d.avg>=bk*0.85?'#EF9F27':'#E24B4A';
    const bg=d.avg>=bk?'#eaf3de':d.avg>=bk*0.85?'#faeeda':'#fcebeb';
    const fg=d.avg>=bk?'#3b6d11':d.avg>=bk*0.85?'#854f0b':'#a32d2d';
    const lbl=d.avg>=bk?'Target met':'Below target';
    return`<div class="mbar">
      <div class="mbar-row">
        <span class="mbar-label">${d.m}</span>
        <span class="mbar-val">${$f(Math.round(d.avg))}<span style="font-size:11px;font-weight:400;color:#aaa;">/wk avg</span></span>
        <span class="mbar-badge" style="background:${bg};color:${fg};">${lbl}</span>
      </div>
      <div class="mbar-track">
        <div class="mbar-fill" style="width:${bp}%;background:${col};"></div>
        <div class="mbar-line" style="left:min(99%,99%);"></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('v-int').innerHTML=`
    <div class="g4" style="margin-bottom:1rem;">
      <div class="met"><div class="ml">Total turnover</div><div class="mv">${$f(totTO)}</div><div class="ms">${n} weeks</div></div>
      <div class="met"><div class="ml">Total wages</div><div class="mv">${$f(totW)}</div><div class="ms">${$p(awp)} of turnover</div></div>
      <div class="met"><div class="ml">Total op. exp.</div><div class="mv">${$f(totO)}</div></div>
      <div class="met" style="background:${totPr>=0?'#eaf3de':'#fcebeb'};"><div class="ml" style="color:${totPr>=0?'#3b6d11':'#a32d2d'};">Net profit/loss</div><div class="mv" style="color:${totPr>=0?'#3b6d11':'#a32d2d'};">${$f(totPr)}</div><div class="ms" style="color:${totPr>=0?'#639922':'#e24b4a'};">${$f(Math.round(avgPr))}/wk avg</div></div>
    </div>
    <div class="card0" style="margin-bottom:1rem;">
      <div style="padding:12px 14px;border-bottom:1px solid #e5e5e3;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:13px;font-weight:600;">Monthly breakdown — ${curYear}</span><span style="font-size:11px;color:#aaa;">Breakeven: ${$f(bk)}/wk</span></div>
      <div style="overflow-x:auto;"><table>
        <thead><tr><th style="text-align:left;min-width:50px;">Month</th><th>Wks</th><th>Turnover</th><th>Avg/wk</th><th>Wages</th><th>Op.exp</th><th>Wage%</th><th>Cost%</th><th>Profit/loss</th></tr></thead>
        <tbody>${mRows}</tbody>
      </table></div>
    </div>
    <div class="card" style="margin-bottom:1rem;">
      <div class="sl" style="margin-bottom:12px;">Monthly avg vs breakeven target (${$f(bk)}/wk)</div>
      ${mBars}
    </div>
    <div class="card0" style="margin-bottom:1rem;">
      <div style="padding:12px 14px;border-bottom:1px solid #e5e5e3;display:flex;justify-content:space-between;"><span style="font-size:13px;font-weight:600;">Weekly breakdown</span><span style="font-size:11px;color:#aaa;">${curYear}</span></div>
      <div style="overflow-x:auto;"><table>
        <thead><tr><th style="text-align:left;min-width:100px;">Week</th><th>Turnover</th><th>Hrs</th><th>Wage</th><th>Op.exp</th><th>Total cost</th><th>Wage%</th><th>Cost%</th><th>Profit/loss</th></tr></thead>
        <tbody>
          ${weeks.map(w=>`<tr><td>${w.date}</td><td>${$f(w.t)}</td><td>${w.h}</td><td>${$f(w.w)}</td><td>${$f(w.o)}</td><td>${$f(w.tc)}</td><td class="${pc(w.wp)}">${$p(w.wp)}</td><td class="${pc(w.cp)}">${$p(w.cp)}</td><td class="${prof(w.pr)}">${$f(w.pr)}</td></tr>`).join('')}
          <tr class="tr"><td>Total</td><td>${$f(totTO)}</td><td>-</td><td>${$f(totW)}</td><td>${$f(totO)}</td><td>${$f(totC)}</td><td class="${pc(awp)}">${$p(awp)}</td><td class="${pc(acp)}">${$p(acp)}</td><td class="${prof(totPr)}">${$f(totPr)}</td></tr>
          <tr class="ar"><td>Average</td><td>${$f(avgTO)}</td><td>-</td><td>${$f(avgW)}</td><td>${$f(avgO)}</td><td>${$f(avgC)}</td><td class="${pc(awp)}">${$p(awp)}</td><td class="${pc(acp)}">${$p(acp)}</td><td class="${prof(avgPr)}">${$f(avgPr)}</td></tr>
        </tbody>
      </table></div>
    </div>
    <div class="g2" style="margin-bottom:1rem;">
      <div class="card"><div class="sl">Turnover vs cost (weekly)</div><div style="position:relative;height:180px;"><canvas id="rc1" role="img" aria-label="Turnover vs cost chart"></canvas></div></div>
      <div class="card"><div class="sl">Cost % trend</div><div style="position:relative;height:180px;"><canvas id="rc2" role="img" aria-label="Cost percentage chart"></canvas></div></div>
    </div>
    <div class="card" style="margin-bottom:1rem;">
      <div class="g3">
        <div class="met"><div class="ml">Avg turnover/week</div><div class="mv">${$f(Math.round(avgTO))}</div><div class="ms">${n} weeks recorded</div></div>
        <div class="met"><div class="ml">Avg wage/week</div><div class="mv">${$f(avgW)}</div><div class="ms" style="color:${awp>45?'#a32d2d':'#3b6d11'};">${$p(awp)} of turnover</div></div>
        <div class="met" style="background:${avgPr>=0?'#eaf3de':'#fcebeb'};"><div class="ml" style="color:${avgPr>=0?'#3b6d11':'#a32d2d'};">Avg profit/week</div><div class="mv" style="color:${avgPr>=0?'#3b6d11':'#a32d2d'};">${$f(avgPr)}</div></div>
      </div>
      <div class="ins ins-a" style="margin-top:10px;"><strong>Breakeven:</strong> ${s.name} needs <strong>${$f(bk)}/week</strong> to cover all costs.</div>
    </div>`;

  // Staff view
  const maxB=Math.max(...weeks.map(w=>w.t),bk)*1.15;
  const wkBars=weeks.map(w=>{
    const bp=Math.min((w.t/maxB)*100,100),tp=Math.min((bk/maxB)*100,100);
    const hit=w.t>=bk,close=w.t>=bk*0.85;
    const col=hit?'#639922':close?'#EF9F27':'#E24B4A',bg=hit?'#eaf3de':close?'#faeeda':'#fcebeb',fg=hit?'#3b6d11':close?'#854f0b':'#a32d2d';
    return`<div class="mbar"><div class="mbar-row"><span style="font-size:12px;color:#888;width:110px;flex-shrink:0;">${w.date}</span><span class="mbar-val">${$f(w.t)}</span><span class="mbar-badge" style="background:${bg};color:${fg};">${hit?'Target met':close?'Close':'Below'}</span></div><div class="mbar-track"><div class="mbar-fill" style="width:${bp}%;background:${col};"></div><div class="mbar-line" style="left:${tp}%;"></div></div></div>`;
  }).join('');
  const hit=weeks.filter(w=>w.t>=bk).length,hitp=Math.round((hit/n)*100);
  document.getElementById('v-stf').innerHTML=`
    <div class="card" style="margin-bottom:1rem;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #f0f0ee;">
        <div class="avt" style="width:48px;height:48px;font-size:16px;background:${s.c.bg};color:${s.c.fg};">${ini(s.name)}</div>

      </div>
      <div class="g3">

      </div>
    </div>
    <div class="card" style="margin-bottom:1rem;">
      <div class="sl" style="margin-bottom:12px;">Monthly performance vs target</div>
      ${mBars}

      ${wkBars}
    </div>
    <div class="card" style="margin-bottom:1rem;">
      <div class="sl">Turnover trend</div>
      <div style="position:relative;height:200px;"><canvas id="sc1" role="img" aria-label="Turnover trend"></canvas></div>
    </div>
    <div class="ins ${hitp>=70?'ins-g':hitp>=40?'ins-a':'ins-r'}">

    </div>`;

  window._rd={weeks,bk,s};
}

function switchView(v){
  curView=v;
  document.getElementById('v-int').style.display=v==='int'?'block':'none';
  document.getElementById('v-stf').style.display=v==='stf'?'block':'none';
  document.getElementById('rv-int').classList.toggle('on',v==='int');
  document.getElementById('rv-stf').classList.toggle('on',v==='stf');
  killCharts();
  setTimeout(()=>renderCharts(v),80);
}

function renderCharts(v){
  if(!window._rd)return;
  const{weeks,bk}=window._rd;
  const labs=weeks.map(w=>w.date.replace(/\s\d{4}/,'').replace(/^\d+-/,''));
  if(v==='int'){
    const c1=document.getElementById('rc1'),c2=document.getElementById('rc2');
    if(c1)charts.rc1=new Chart(c1,{type:'bar',data:{labels:labs,datasets:[{label:'Turnover',data:weeks.map(w=>w.t),backgroundColor:'#378ADD',borderRadius:2},{label:'Total cost',data:weeks.map(w=>w.tc),backgroundColor:'#E24B4A',borderRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},autoSkip:true,maxTicksLimit:10},grid:{display:false}},y:{ticks:{font:{size:10},callback:v=>'$'+Math.round(v/1000)+'k'},grid:{color:'rgba(0,0,0,0.04)'}}}}});
    if(c2)charts.rc2=new Chart(c2,{type:'line',data:{labels:labs,datasets:[{label:'Cost%',data:weeks.map(w=>Math.round(w.cp)),borderColor:'#E24B4A',backgroundColor:'rgba(226,75,74,0.07)',tension:0.3,pointRadius:2,fill:true},{label:'Target',data:weeks.map(()=>100),borderColor:'#639922',borderDash:[4,4],pointRadius:0,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},autoSkip:true,maxTicksLimit:10},grid:{display:false}},y:{ticks:{font:{size:10},callback:v=>v+'%'},grid:{color:'rgba(0,0,0,0.04)'},min:0}}}});
  }
  if(v==='stf'){
    const c1=document.getElementById('sc1');
    if(c1)charts.sc1=new Chart(c1,{type:'line',data:{labels:labs,datasets:[{label:'Turnover',data:weeks.map(w=>w.t),borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,0.07)',tension:0.3,pointBackgroundColor:weeks.map(w=>w.t>=bk?'#639922':'#E24B4A'),pointRadius:4,fill:true},{label:'Target',data:weeks.map(()=>bk),borderColor:'#854F0B',borderDash:[5,4],pointRadius:0,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},autoSkip:true,maxTicksLimit:10},grid:{display:false}},y:{ticks:{font:{size:10},callback:v=>'$'+Math.round(v/1000)+'k'},grid:{color:'rgba(0,0,0,0.04)'},min:0}}}});
  }
}

document.getElementById('upd').textContent='Updated: '+new Date().toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
buildDash();
</script>
